name: Moodring Daily Update

on:
  schedule:
    # Run twice to handle GitHub Actions cron unreliability
    - cron: '0 14 * * 1-5'   # 22:00 Taipei time (UTC+8) — after US close
    - cron: '30 1 * * 1-5'   # 09:30 Taipei time — after TW/Asia open
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Pre-run history audit (tripwire — blocks on existing violations)
        run: |
          YESTERDAY=$(date -d "yesterday" +%Y-%m-%d)
          SINCE=$(date -d "7 days ago" +%Y-%m-%d)
          python scripts/audit_history.py --strict --since "$SINCE" --until "$YESTERDAY"

      - name: Pull fresh market data
        run: python src/daily_update.py

      - name: Post-run history audit (verify recent data is clean)
        run: |
          YESTERDAY=$(date -d "yesterday" +%Y-%m-%d)
          SINCE=$(date -d "7 days ago" +%Y-%m-%d)
          python scripts/audit_history.py --strict --since "$SINCE" --until "$YESTERDAY"

      - name: Rebuild dashboard JSON
        run: python src/rebuild_dashboard_daily.py

      - name: Regenerate narratives via Claude API
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python src/regen_narratives.py

      - name: Sync data to docs
        run: |
          mkdir -p docs/data
          cp data/*.json docs/data/

      - name: Validate narratives (freshness assertion)
        run: |
          python -c "
          import json
          d = json.loads(open('docs/data/phase2_agent_results.json', encoding='utf-8').read())
          for k in ['tw_agent', 'us_agent']:
              score_key = f'{k[:2]}_base_score'
              score = d.get(score_key)
              fo = (d.get(k, {}) or {}).get('forward_outlook', '') or ''
              if score is not None:
                  s = f'{score:.1f}'
                  assert s in fo, f'{k}.forward_outlook missing {s}: {fo[:80]}'
          print('narrative freshness OK')
          "

      - name: Commit and push
        run: |
          git config user.name "Moodring Bot"
          git config user.email "moodring-bot@users.noreply.github.com"
          git add data/ docs/data/
          git diff --staged --quiet || git commit -m "daily: Moodring update $(date +%Y-%m-%d)"
          git push
